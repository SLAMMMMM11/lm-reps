<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión — VIAJES LM-REPS</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="../Assets/css/style.css">
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>

<body class="bg-light">

  <header>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand" href="/">
          <img src="../Assets/img/og-image.png" alt="Logo">
        </a>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <div class="col-lg-5 mx-auto">
      <div class="card p-4 p-md-5 border-0 shadow-sm rounded-4">
        <h2 class="fw-bold mb-1">Iniciar sesión</h2>
        <p class="text-muted small mb-4">Accede a tu cuenta para ver tu saldo y cronograma de pagos.</p>

        <div id="loginAlert" class="alert d-none" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label small fw-bold">Correo electrónico</label>
            <input type="email" name="email" class="form-control bg-light border-0 py-2" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Contraseña</label>
            <input type="password" name="password" class="form-control bg-light border-0 py-2" required>
          </div>
          <div class="mb-3">
            <div class="h-captcha" data-sitekey="82964098-012e-4bd2-9ec4-d8d29eca605e"></div>
          </div>
          <div class="mb-3 text-end">
            <a href="/recuperar-password" class="small">¿Olvidaste tu contraseña?</a>
          </div>
          <button type="submit" class="btn btn-danger w-100 py-2 border-0" style="background-color: var(--brand-primary);" id="loginSubmitBtn">
            Iniciar sesión
          </button>
        </form>

        <form id="mfaChallengeForm" class="d-none" novalidate>
          <p class="small text-muted mb-3">Ingresa el código de 6 dígitos de tu app de autenticación.</p>
          <div class="mb-3">
            <input type="text" inputmode="numeric" maxlength="6" class="form-control bg-light border-0 py-2 text-center"
              style="font-size: 1.5rem; letter-spacing: 0.3rem;" id="mfaCodeInput" placeholder="123456" autocomplete="one-time-code">
          </div>
          <button type="submit" class="btn btn-danger w-100 py-2 border-0" style="background-color: var(--brand-primary);" id="mfaChallengeSubmitBtn">
            Verificar
          </button>
        </form>

        <p class="text-center small mt-4 mb-0">
          ¿No tienes cuenta? <a href="/registro">Regístrate</a>
        </p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../Assets/scripts/login.js"></script>
</body>

</html>
