<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contáctanos — VIAJES LM-REPS</title>

  <!-- Fuentes y Bootstrap (Igual que tu index) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- Tu archivo CSS único -->
  <link rel="stylesheet" href="../Assets/css/style.css">
</head>

<body class="bg-light">
  <!-- Navbar (Ajustada para que los links funcionen desde la carpeta Pages) -->
  <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html"><img src="../Assets/img/og-image.png" alt="Logo" style="max-height: 55px;"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="../index.html">INICIO</a></li>
          <li class="nav-item"><a class="nav-link" href="../index.html#Promociones">PROMOCIONES</a></li>
          <li class="nav-item ms-lg-3"><a class="nav-link btn-reserva text-center" href="https://wa.me/51987594032" target="_blank"><i class="bi bi-whatsapp me-2"></i>WHATSAPP</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero de Contacto -->
  <header class="contact-hero-section">
    <div class="container">
      <h1 class="display-4 fw-bold">Ponte en contacto</h1>
      <p class="lead">¿Tienes dudas sobre un destino? Nuestro equipo está listo para ayudarte.</p>
    </div>
  </header>

  <main class="container py-5">
    <div class="row g-4">
      
      <!-- Información de contacto lateral -->
      <div class="col-lg-4">
        <div class="card p-4 border-0 shadow-sm rounded-4 h-100">
          <div class="mb-4 text-center">
            <img src="../Assets/img/og-image.png" alt="Logo" class="img-fluid" style="max-height: 70px;">
          </div>
          <div class="d-flex align-items-center mb-4">
            <div class="contact-icon-box me-3"><i class="bi bi-geo-alt-fill"></i></div>
            <div>
              <h6 class="mb-0 fw-bold">Ubicación</h6>
              <p class="small text-muted mb-0">JR. TARATA NRO. 135, Pucallpa</p>
            </div>
          </div>
          <div class="d-flex align-items-center mb-4">
            <div class="contact-icon-box me-3"><i class="bi bi-envelope-at-fill"></i></div>
            <div>
              <h6 class="mb-0 fw-bold">Email</h6>
              <p class="small text-muted mb-0">reservas@lm-reps.com</p>
            </div>
          </div>
          <div class="d-flex align-items-center">
            <div class="contact-icon-box me-3"><i class="bi bi-whatsapp"></i></div>
            <div>
              <h6 class="mb-0 fw-bold">WhatsApp</h6>
              <p class="small text-muted mb-0">(+51) 987 594 032</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Formulario de Contacto (Netlify) -->
      <div class="col-lg-8">
        <div class="card p-4 p-md-5 border-0 shadow-sm rounded-4">
          <form name="contacto" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" id="contactForm">
            <!-- Configuración Netlify -->
            <input type="hidden" name="form-name" value="contacto">
            <p class="d-none"><label>Honeypot: <input name="bot-field" /></label></p>

            <h2 class="fw-bold mb-4">Envíanos un mensaje</h2>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label small fw-bold">Nombre Completo *</label>
                <input type="text" name="nombre" class="form-control bg-light border-0 py-2" required>
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-bold">Correo Electrónico *</label>
                <input type="email" name="email" class="form-control bg-light border-0 py-2" required>
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-bold">Teléfono / WhatsApp *</label>
                <input type="tel" name="telefono" class="form-control bg-light border-0 py-2" required>
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-bold">Tipo de Consulta</label>
                <select name="destino" class="form-select bg-light border-0 py-2">
                  <option value="General">Consulta General</option>
                  <option value="Cotización">Cotización</option>
                  <option value="Documentos">Documentos</option>
                  <option value="Cambios">Cambios</option>
                  <option value="Devoluciones">Devoluciones</option>
                  <option value="Equipaje">Equipaje</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label small fw-bold">¿Cómo podemos ayudarte? *</label>
                <textarea name="mensaje" class="form-control bg-light border-0" rows="5" required></textarea>
              </div>
              <div class="col-12 mt-4 text-end">
                <button type="submit" class="btn btn-danger btn-lg px-5 shadow-sm border-0" style="background-color: var(--brand-primary);" id="contactSubmitBtn">
                  Enviar Mensaje <i class="bi bi-send ms-2"></i>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

    </div>
  </main>

  <!-- Tu script global único -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../Assets/scripts/main.js"></script>
</body>

</html>
