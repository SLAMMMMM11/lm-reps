<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Viajes LM" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crear cuenta — VIAJES LM-REPS</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="../Assets/css/style.css">
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>

<body class="bg-light">

  <header>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand" href="/">
          <img src="../Assets/img/og-image.png" alt="Logo">
        </a>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <div class="col-lg-6 mx-auto">
      <div class="card p-4 p-md-5 border-0 shadow-sm rounded-4">
        <h2 class="fw-bold mb-1">Crear cuenta</h2>
        <p class="text-muted small mb-4">Regístrate para acceder a tu cuenta de cliente.</p>

        <div id="registroAlert" class="alert d-none" role="alert"></div>

        <form id="registroForm" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Nombre completo *</label>
              <input type="text" name="full_name" class="form-control bg-light border-0 py-2" required>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">DNI *</label>
              <input type="text" name="dni" class="form-control bg-light border-0 py-2" pattern="[0-9]{8}" maxlength="8" required>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Teléfono / WhatsApp *</label>
              <input type="tel" name="phone" class="form-control bg-light border-0 py-2" required>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Correo electrónico *</label>
              <input type="email" name="email" class="form-control bg-light border-0 py-2" required>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Contraseña *</label>
              <input type="password" name="password" class="form-control bg-light border-0 py-2" minlength="8" required>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Confirmar contraseña *</label>
              <input type="password" name="password2" class="form-control bg-light border-0 py-2" minlength="8" required>
            </div>

            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="consentCheck" required>
                <label class="form-check-label small" for="consentCheck">
                  Acepto que VIAJES LM-REPS guarde mis datos personales (nombre, DNI, teléfono, correo) y
                  comprobantes de pago que suba, únicamente para gestionar mi cuenta y mi plan de pagos. *
                </label>
              </div>
            </div>

            <div class="col-12 mt-2">
              <div class="h-captcha" data-sitekey="82964098-012e-4bd2-9ec4-d8d29eca605e"></div>
            </div>

            <div class="col-12 mt-3">
              <button type="submit" class="btn btn-danger w-100 py-2 border-0" style="background-color: var(--brand-primary);" id="registroSubmitBtn">
                Crear cuenta
              </button>
            </div>
          </div>
        </form>

        <p class="text-center small mt-4 mb-0">
          ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
        </p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../Assets/scripts/registro.js"></script>
</body>

</html>
