<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Viajes LM" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Actualizar contraseña — VIAJES LM-REPS</title>
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_PE">
  <meta property="og:site_name" content="Viajes LM-REPS">
  <meta property="og:title" content="Actualizar contraseña — VIAJES LM-REPS">
  <meta property="og:description" content="Actualiza la contraseña de tu cuenta de Viajes LM-REPS.">
  <meta property="og:url" content="https://lm-reps.com/actualizar-password">
  <meta property="og:image" content="https://lm-reps.com/Assets/img/og-logo.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Actualizar contraseña — VIAJES LM-REPS">
  <meta name="twitter:description" content="Actualiza la contraseña de tu cuenta de Viajes LM-REPS.">
  <meta name="twitter:image" content="https://lm-reps.com/Assets/img/og-logo.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="../Assets/css/style.css">
</head>

<body class="bg-light">

  <header>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand" href="/">
          <img src="../Assets/img/og-image.png" alt="Logo">
        </a>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <div class="col-lg-5 mx-auto">
      <div class="card p-4 p-md-5 border-0 shadow-sm rounded-4">
        <h2 class="fw-bold mb-1">Nueva contraseña</h2>
        <p class="text-muted small mb-4">Elige una nueva contraseña para tu cuenta.</p>

        <div id="actualizarAlert" class="alert d-none" role="alert"></div>

        <form id="actualizarForm" novalidate>
          <div class="mb-3">
            <label class="form-label small fw-bold">Nueva contraseña</label>
            <input type="password" name="password" class="form-control bg-light border-0 py-2" minlength="8" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Confirmar contraseña</label>
            <input type="password" name="password2" class="form-control bg-light border-0 py-2" minlength="8" required>
          </div>
          <button type="submit" class="btn btn-danger w-100 py-2 border-0" style="background-color: var(--brand-primary);" id="actualizarSubmitBtn">
            Guardar nueva contraseña
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../Assets/scripts/actualizar-password.js"></script>
</body>

</html>
